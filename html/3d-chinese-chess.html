<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 中国象棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Microsoft YaHei', 'SimHei', sans-serif; }
#info {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 20px; background: rgba(0,0,0,0.7);
  padding: 10px 24px; border-radius: 8px; pointer-events: none;
  z-index: 10; text-align: center; min-width: 200px;
  border: 1px solid rgba(255,255,255,0.15);
}
#info .turn-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
#info .turn-dot.red { background: #e74c3c; box-shadow: 0 0 10px #e74c3c88; }
#info .turn-dot.black { background: #2c3e50; box-shadow: 0 0 10px #2c3e5088; border: 1px solid #666; }
#info .status-text { vertical-align: middle; }
#controls {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 14px;
}
#controls button {
  padding: 10px 28px; font-size: 16px; border: none; border-radius: 8px;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
  background: rgba(255,255,255,0.12); color: #fff; backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
}
#controls button:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
#controls button:active { transform: translateY(0); }
#captured {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  color: #fff; font-size: 18px; z-index: 10; text-align: center;
  pointer-events: none; min-width: 50px;
}
#captured .cap-group { margin: 16px 0; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 8px; }
#captured .cap-group .label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
#captured .cap-group .chars { font-size: 18px; letter-spacing: 3px; line-height: 1.6; }
#captured .cap-group .chars.red-text { color: #e74c3c; }
#captured .cap-group .chars.black-text { color: #bdc3c7; }
.label-2d {
  font-size: 22px; font-weight: bold; font-family: 'KaiTi', 'STKaiti', 'Microsoft YaHei', serif;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3); user-select: none; pointer-events: none;
  transition: transform 0.15s;
}
.label-2d.red { color: #c0392b; }
.label-2d.black { color: #1a1a2e; }
.label-2d.selected { transform: scale(1.15); }
</style>
</head>
<body>

<div id="info">
  <span class="turn-dot red" id="turnDot"></span>
  <span class="status-text" id="statusText">红方走棋</span>
</div>

<div id="captured"></div>

<div id="controls">
  <button id="btnReset">重新开始</button>
  <button id="btnRotate">旋转视角</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ===== Constants =====
const COLS = 9, ROWS = 10;
const CELL = 1;
const PIECE_NAMES = {
  red:    { general:'帅', advisor:'仕', elephant:'相', horse:'马', chariot:'车', cannon:'炮', soldier:'兵' },
  black:  { general:'将', advisor:'士', elephant:'象', horse:'马', chariot:'车', cannon:'砲', soldier:'卒' }
};
const RED = 'red', BLACK = 'black';

// ===== Utility =====
function boardToWorld(col, row) {
  return new THREE.Vector3((col - 4) * CELL, 0, (row - 4.5) * CELL);
}

function inBoard(col, row) { return col >= 0 && col < COLS && row >= 0 && row < ROWS; }

function inPalace(col, row, color) {
  if (col < 3 || col > 5) return false;
  return color === RED ? (row >= 7 && row <= 9) : (row >= 0 && row <= 2);
}

function crossedRiver(row, color) {
  return color === RED ? row <= 4 : row >= 5;
}

function enemyColor(color) { return color === RED ? BLACK : RED; }

// ===== Game State =====
let board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
let pieces = [];
let selectedPiece = null;
let currentTurn = RED;
let gameOver = false;
let validMoves = [];
let moveHistory = [];

// Three.js objects
let scene, camera, renderer, labelRenderer, controls;
let boardGroup, pieceGroup, markerGroup;
let raycaster, pointer;

// Camera presets
const VIEW_PRESETS = [
  { pos: [6, 10, 8], target: [0, 0, 0] },
  { pos: [0, 14, 0.01], target: [0, 0, 0] },
  { pos: [-6, 8, -6], target: [0, 0, 0] },
];
let viewIndex = 0;

// ===== Piece Class =====
class ChessPiece {
  constructor(type, color, row, col) {
    this.type = type;
    this.color = color;
    this.row = row;
    this.col = col;
    this.alive = true;
    this.mesh = null;
    this.label = null;
    this.ring = null;
    this.char = PIECE_NAMES[color][type];
  }
}

// ===== Movement Rules =====
function getRawMoves(piece) {
  const { type, color, row, col } = piece;
  const moves = [];
  const enemy = enemyColor(color);
  const canMove = (r, c) => {
    if (!inBoard(c, r)) return false;
    const target = board[r][c];
    return !target || target.color === enemy;
  };

  switch (type) {
    case 'general': {
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dc, dr] of dirs) {
        const nc = col + dc, nr = row + dr;
        if (inPalace(nc, nr, color) && canMove(nr, nc)) moves.push({row: nr, col: nc});
      }
      break;
    }
    case 'advisor': {
      const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
      for (const [dc, dr] of dirs) {
        const nc = col + dc, nr = row + dr;
        if (inPalace(nc, nr, color) && canMove(nr, nc)) moves.push({row: nr, col: nc});
      }
      break;
    }
    case 'elephant': {
      const dirs = [[2,2],[2,-2],[-2,2],[-2,-2]];
      for (const [dc, dr] of dirs) {
        const nc = col + dc, nr = row + dr;
        const blockC = col + dc/2, blockR = row + dr/2;
        if (!inBoard(nc, nr) || !canMove(nr, nc)) continue;
        if (board[blockR][blockC]) continue;
        if ((color === RED && nr < 5) || (color === BLACK && nr > 4)) continue;
        moves.push({row: nr, col: nc});
      }
      break;
    }
    case 'horse': {
      const jumps = [
        {leg: [0,-1], move: [-1,-2]}, {leg: [0,-1], move: [1,-2]},
        {leg: [0,1], move: [-1,2]}, {leg: [0,1], move: [1,2]},
        {leg: [-1,0], move: [-2,-1]}, {leg: [-1,0], move: [-2,1]},
        {leg: [1,0], move: [2,-1]}, {leg: [1,0], move: [2,1]},
      ];
      for (const {leg, move} of jumps) {
        const lc = col + leg[0], lr = row + leg[1];
        const nc = col + move[0], nr = row + move[1];
        if (!inBoard(lc, lr) || board[lr][lc]) continue;
        if (!inBoard(nc, nr) || !canMove(nr, nc)) continue;
        moves.push({row: nr, col: nc});
      }
      break;
    }
    case 'chariot': {
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dc, dr] of dirs) {
        let nc = col + dc, nr = row + dr;
        while (inBoard(nc, nr)) {
          const target = board[nr][nc];
          if (!target) moves.push({row: nr, col: nc});
          else { if (target.color === enemy) moves.push({row: nr, col: nc}); break; }
          nc += dc; nr += dr;
        }
      }
      break;
    }
    case 'cannon': {
      const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
      for (const [dc, dr] of dirs) {
        let nc = col + dc, nr = row + dr;
        let jumped = false;
        while (inBoard(nc, nr)) {
          const target = board[nr][nc];
          if (!jumped) {
            if (!target) moves.push({row: nr, col: nc});
            else jumped = true;
          } else {
            if (target) {
              if (target.color === enemy) moves.push({row: nr, col: nc});
              break;
            }
          }
          nc += dc; nr += dr;
        }
      }
      break;
    }
    case 'soldier': {
      const forward = color === RED ? -1 : 1;
      const nr = row + forward;
      if (inBoard(col, nr) && canMove(nr, col)) moves.push({row: nr, col: col});
      if (crossedRiver(row, color)) {
        for (const dc of [-1, 1]) {
          const nc = col + dc;
          if (inBoard(nc, row) && canMove(row, nc)) moves.push({row: row, col: nc});
        }
      }
      break;
    }
  }
  return moves;
}

function simulateMove(piece, toRow, toCol) {
  const captured = board[toRow][toCol];
  const fromRow = piece.row, fromCol = piece.col;
  board[fromRow][fromCol] = null;
  board[toRow][toCol] = piece;
  piece.row = toRow; piece.col = toCol;
  if (captured) captured.alive = false;
  return { captured, fromRow, fromCol };
}

function undoMove(piece, toRow, toCol, state) {
  const { captured, fromRow, fromCol } = state;
  piece.row = fromRow; piece.col = fromCol;
  board[fromRow][fromCol] = piece;
  board[toRow][toCol] = captured || null;
  if (captured) captured.alive = true;
}

function isInCheck(color) {
  const general = pieces.find(p => p.type === 'general' && p.color === color && p.alive);
  if (!general) return true;
  const enemy = enemyColor(color);
  for (const p of pieces) {
    if (p.color !== enemy || !p.alive) continue;
    const moves = getRawMoves(p);
    if (moves.some(m => m.row === general.row && m.col === general.col)) return true;
  }
  // Flying general: two generals facing each other on same column with no pieces between
  const enemyGen = pieces.find(p => p.type === 'general' && p.color === enemy && p.alive);
  if (enemyGen && enemyGen.col === general.col) {
    let blocked = false;
    const minR = Math.min(general.row, enemyGen.row);
    const maxR = Math.max(general.row, enemyGen.row);
    for (let r = minR + 1; r < maxR; r++) {
      if (board[r][general.col]) { blocked = true; break; }
    }
    if (!blocked) return true;
  }
  return false;
}

function getValidMoves(piece) {
  const raw = getRawMoves(piece);
  const valid = [];
  for (const m of raw) {
    const state = simulateMove(piece, m.row, m.col);
    if (!isInCheck(piece.color)) valid.push(m);
    undoMove(piece, m.row, m.col, state);
  }
  return valid;
}

function isCheckmate(color) {
  for (const p of pieces) {
    if (p.color !== color || !p.alive) continue;
    if (getValidMoves(p).length > 0) return false;
  }
  return true;
}

// ===== Board Setup =====
function initBoardState() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  pieces = [];

  const setup = [
    { type: 'chariot', color: BLACK, row: 0, col: 0 },
    { type: 'horse', color: BLACK, row: 0, col: 1 },
    { type: 'elephant', color: BLACK, row: 0, col: 2 },
    { type: 'advisor', color: BLACK, row: 0, col: 3 },
    { type: 'general', color: BLACK, row: 0, col: 4 },
    { type: 'advisor', color: BLACK, row: 0, col: 5 },
    { type: 'elephant', color: BLACK, row: 0, col: 6 },
    { type: 'horse', color: BLACK, row: 0, col: 7 },
    { type: 'chariot', color: BLACK, row: 0, col: 8 },
    { type: 'cannon', color: BLACK, row: 2, col: 1 },
    { type: 'cannon', color: BLACK, row: 2, col: 7 },
    { type: 'soldier', color: BLACK, row: 3, col: 0 },
    { type: 'soldier', color: BLACK, row: 3, col: 2 },
    { type: 'soldier', color: BLACK, row: 3, col: 4 },
    { type: 'soldier', color: BLACK, row: 3, col: 6 },
    { type: 'soldier', color: BLACK, row: 3, col: 8 },
    { type: 'chariot', color: RED, row: 9, col: 0 },
    { type: 'horse', color: RED, row: 9, col: 1 },
    { type: 'elephant', color: RED, row: 9, col: 2 },
    { type: 'advisor', color: RED, row: 9, col: 3 },
    { type: 'general', color: RED, row: 9, col: 4 },
    { type: 'advisor', color: RED, row: 9, col: 5 },
    { type: 'elephant', color: RED, row: 9, col: 6 },
    { type: 'horse', color: RED, row: 9, col: 7 },
    { type: 'chariot', color: RED, row: 9, col: 8 },
    { type: 'cannon', color: RED, row: 7, col: 1 },
    { type: 'cannon', color: RED, row: 7, col: 7 },
    { type: 'soldier', color: RED, row: 6, col: 0 },
    { type: 'soldier', color: RED, row: 6, col: 2 },
    { type: 'soldier', color: RED, row: 6, col: 4 },
    { type: 'soldier', color: RED, row: 6, col: 6 },
    { type: 'soldier', color: RED, row: 6, col: 8 },
  ];

  for (const s of setup) {
    const p = new ChessPiece(s.type, s.color, s.row, s.col);
    pieces.push(p);
    board[s.row][s.col] = p;
  }
}

// ===== 3D Scene =====
const woodMat = new THREE.MeshStandardMaterial({
  color: 0xd4a56a, roughness: 0.6, metalness: 0.05
});
const gridMat = new THREE.LineBasicMaterial({ color: 0x5a3e1b, depthTest: true });
const markerMat = new THREE.MeshStandardMaterial({
  color: 0x2ecc71, transparent: true, opacity: 0.45, depthWrite: false, roughness: 0.3, side: THREE.DoubleSide
});
const markerCapMat = new THREE.MeshStandardMaterial({
  color: 0xe74c3c, transparent: true, opacity: 0.55, depthWrite: false, roughness: 0.3, side: THREE.DoubleSide
});
const pieceMat = new THREE.MeshStandardMaterial({
  color: 0xf5e6c8, roughness: 0.4, metalness: 0.05
});
const pieceBorderMat = new THREE.MeshStandardMaterial({
  color: 0xd4c4a0, roughness: 0.5, metalness: 0.05
});
const ringMat = new THREE.MeshStandardMaterial({
  color: 0xf1c40f, emissive: 0xf1c40f, emissiveIntensity: 0.3,
  transparent: true, opacity: 0.9, roughness: 0.3, metalness: 0.3, side: THREE.DoubleSide
});

function createLabel(text, style) {
  const div = document.createElement('div');
  div.textContent = text;
  div.style.cssText = style;
  return new CSS2DObject(div);
}

function createBoard() {
  boardGroup = new THREE.Group();
  scene.add(boardGroup);

  // Base board
  const baseGeo = new THREE.BoxGeometry((COLS - 1) * CELL + 0.8, 0.2, (ROWS - 1) * CELL + 0.8);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.8, metalness: 0 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = -0.1;
  base.receiveShadow = true;
  boardGroup.add(base);

  // Surface (playing area)
  const surfGeo = new THREE.PlaneGeometry((COLS - 1) * CELL + 0.2, (ROWS - 1) * CELL + 0.2);
  const surf = new THREE.Mesh(surfGeo, woodMat);
  surf.rotation.x = -Math.PI / 2;
  surf.position.y = 0.01;
  surf.receiveShadow = true;
  boardGroup.add(surf);

  // Grid lines
  const gridPoints = [];
  // Horizontal lines
  for (let r = 0; r < ROWS; r++) {
    const z = (r - 4.5) * CELL;
    gridPoints.push(new THREE.Vector3(-4 * CELL, 0.02, z), new THREE.Vector3(4 * CELL, 0.02, z));
  }
  // Vertical lines (with river break for non-edge columns)
  for (let c = 0; c < COLS; c++) {
    const x = (c - 4) * CELL;
    if (c === 0 || c === 8) {
      gridPoints.push(new THREE.Vector3(x, 0.02, 4.5 * CELL), new THREE.Vector3(x, 0.02, -4.5 * CELL));
    } else {
      gridPoints.push(new THREE.Vector3(x, 0.02, 4.5 * CELL), new THREE.Vector3(x, 0.02, 0.5 * CELL));
      gridPoints.push(new THREE.Vector3(x, 0.02, -0.5 * CELL), new THREE.Vector3(x, 0.02, -4.5 * CELL));
    }
  }
  const gridGeo = new THREE.BufferGeometry().setFromPoints(gridPoints);
  boardGroup.add(new THREE.LineSegments(gridGeo, gridMat));

  // Palace diagonal lines
  const palacePoints = [];
  const palaces = [
    { r1: 0, c1: 3, r2: 2, c2: 5 },
    { r1: 7, c1: 3, r2: 9, c2: 5 },
  ];
  for (const p of palaces) {
    const z1 = (p.r1 - 4.5) * CELL, x1 = (p.c1 - 4) * CELL;
    const z2 = (p.r2 - 4.5) * CELL, x2 = (p.c2 - 4) * CELL;
    palacePoints.push(new THREE.Vector3(x1, 0.02, z1), new THREE.Vector3(x2, 0.02, z2));
    palacePoints.push(new THREE.Vector3(x2, 0.02, z1), new THREE.Vector3(x1, 0.02, z2));
  }
  const palaceGeo = new THREE.BufferGeometry().setFromPoints(palacePoints);
  boardGroup.add(new THREE.LineSegments(palaceGeo, gridMat));

  // River text
  const riverStyle = 'font-size:28px; font-weight:bold; color:#2c6e8a; font-family:KaiTi,STKaiti,serif; opacity:0.4; letter-spacing:40px;';
  const riverLeft = createLabel('楚 河', riverStyle);
  riverLeft.position.set(-3.5 * CELL, 0.05, -0.2);
  boardGroup.add(riverLeft);
  const riverRight = createLabel('漢 界', riverStyle);
  riverRight.position.set(3.5 * CELL, 0.05, 0.2);
  boardGroup.add(riverRight);

  // Decorative marks at star positions
  const markMat = new THREE.LineBasicMaterial({ color: 0x7a5e3b, transparent: true, opacity: 0.6 });
  // L-shape corner mark: draws two short lines forming an L
  function addCornerMark(cx, cz, dx, dz) {
    const pts = [
      new THREE.Vector3(cx + dx * 0.14, 0.02, cz),
      new THREE.Vector3(cx + dx * 0.14, 0.02, cz + dz * 0.14),
      new THREE.Vector3(cx, 0.02, cz + dz * 0.14),
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    boardGroup.add(new THREE.Line(geo, markMat));
  }
  const starPositions = [
    [1,2],[7,2],[0,3],[2,3],[4,3],[6,3],[8,3],
    [1,7],[7,7],[0,6],[2,6],[4,6],[6,6],[8,6],
  ];
  for (const [c, r] of starPositions) {
    const pos = boardToWorld(c, r);
    // Determine which quadrants to draw based on position
    const quadrants = [];
    if (c > 0) { quadrants.push([-1, -1], [-1, 1]); }
    if (c < 8) { quadrants.push([1, -1], [1, 1]); }
    // For positions on the river edge, omit the river-ward quadrants
    const omitRiver = (r === 3 || r === 6);
    for (const [dx, dz] of quadrants) {
      if (omitRiver && ((r === 3 && dz === 1) || (r === 6 && dz === -1))) continue;
      addCornerMark(pos.x, pos.z, dx, dz);
    }
  }
}

function createPieceMesh(piece) {
  const group = new THREE.Group();

  // Piece body (cylinder)
  const bodyGeo = new THREE.CylinderGeometry(0.35, 0.4, 0.25, 32);
  const body = new THREE.Mesh(bodyGeo, pieceMat.clone());
  body.position.y = 0.125;
  body.castShadow = true;
  group.add(body);

  // Top surface
  const topGeo = new THREE.CircleGeometry(0.33, 32);
  const topMat = new THREE.MeshStandardMaterial({ color: 0xf5e6c8, roughness: 0.4, metalness: 0.05 });
  const top = new THREE.Mesh(topGeo, topMat);
  top.rotation.x = -Math.PI / 2;
  top.position.y = 0.25;
  group.add(top);

  // Bottom rim
  const rimGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 32);
  const rim = new THREE.Mesh(rimGeo, pieceBorderMat);
  rim.position.y = 0.025;
  group.add(rim);

  // CSS2D label
  const labelDiv = document.createElement('div');
  labelDiv.textContent = piece.char;
  labelDiv.className = `label-2d ${piece.color === RED ? 'red' : 'black'}`;
  const label = new CSS2DObject(labelDiv);
  label.position.y = 0.3;
  group.add(label);
  piece.label = label;

  // Selection ring (hidden)
  const ringGeo = new THREE.RingGeometry(0.42, 0.52, 32);
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.01;
  ring.visible = false;
  group.add(ring);
  piece.ring = ring;

  const pos = boardToWorld(piece.col, piece.row);
  group.position.copy(pos);
  group.userData.piece = piece;
  piece.mesh = group;

  return group;
}

function createMarkers(emptyMoves, captureMoves) {
  if (markerGroup) {
    scene.remove(markerGroup);
    markerGroup.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  }
  markerGroup = new THREE.Group();
  scene.add(markerGroup);

  for (const m of emptyMoves) {
    const pos = boardToWorld(m.col, m.row);
    const geo = new THREE.CircleGeometry(0.12, 16);
    const mesh = new THREE.Mesh(geo, markerMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(pos.x, 0.03, pos.z);
    markerGroup.add(mesh);
  }

  for (const m of captureMoves) {
    const pos = boardToWorld(m.col, m.row);
    const geo = new THREE.RingGeometry(0.32, 0.42, 24);
    const mesh = new THREE.Mesh(geo, markerCapMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(pos.x, 0.03, pos.z);
    markerGroup.add(mesh);
  }
}

function clearMarkers() {
  if (markerGroup) {
    scene.remove(markerGroup);
    markerGroup.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    markerGroup = null;
  }
}

function updatePieces() {
  if (pieceGroup) {
    scene.remove(pieceGroup);
    pieceGroup.traverse(child => {
      if (child.isCSS2DObject) { child.element.remove(); }
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
  }
  pieceGroup = new THREE.Group();
  scene.add(pieceGroup);

  for (const p of pieces) {
    if (!p.alive) continue;
    pieceGroup.add(createPieceMesh(p));
  }
}

function selectPiece(piece) {
  if (selectedPiece) {
    if (selectedPiece.ring) selectedPiece.ring.visible = false;
    if (selectedPiece.label) selectedPiece.label.element.classList.remove('selected');
  }
  selectedPiece = piece;
  if (piece) {
    if (piece.ring) piece.ring.visible = true;
    if (piece.label) piece.label.element.classList.add('selected');
  }
}

// ===== UI =====
function updateUI() {
  const dot = document.getElementById('turnDot');
  const text = document.getElementById('statusText');
  dot.className = `turn-dot ${currentTurn}`;

  if (gameOver) {
    const winner = currentTurn === RED ? '黑方' : '红方';
    text.textContent = `将杀！${winner}获胜！`;
    return;
  }

  const inCheck = isInCheck(currentTurn);
  text.textContent = inCheck
    ? `${currentTurn === RED ? '红方' : '黑方'}走棋（将军！）`
    : `${currentTurn === RED ? '红方' : '黑方'}走棋`;

  updateCapturedDisplay();
}

function updateCapturedDisplay() {
  const container = document.getElementById('captured');
  const redCaps = pieces.filter(p => p.color === BLACK && !p.alive);
  const blackCaps = pieces.filter(p => p.color === RED && !p.alive);
  container.innerHTML = `
    <div class="cap-group"><div class="label">红方吃:</div><div class="chars black-text">${redCaps.map(p => p.char).join('') || '—'}</div></div>
    <div class="cap-group"><div class="label">黑方吃:</div><div class="chars red-text">${blackCaps.map(p => p.char).join('') || '—'}</div></div>
  `;
}

// ===== Interaction =====
function onPointerDown(event) {
  if (gameOver) return;

  pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  // Collect piece cylinder meshes for raycasting
  const pieceMeshes = [];
  if (pieceGroup) {
    pieceGroup.children.forEach(childGroup => {
      childGroup.children.forEach(child => {
        if (child.isMesh && child.geometry.type === 'CylinderGeometry') {
          child.userData.parentGroup = childGroup;
          pieceMeshes.push(child);
        }
      });
    });
  }

  const intersects = raycaster.intersectObjects(pieceMeshes);

  if (intersects.length > 0) {
    const hit = intersects[0].object.userData.parentGroup;
    const piece = hit.userData.piece;
    if (!piece || !piece.alive) return;

    if (piece.color === currentTurn) {
      // Select this piece
      selectPiece(piece);
      const moves = getValidMoves(piece);
      validMoves = moves;
      createMarkers(
        moves.filter(m => !board[m.row][m.col]),
        moves.filter(m => board[m.row][m.col])
      );
      return;
    } else if (selectedPiece) {
      const move = validMoves.find(m => m.row === piece.row && m.col === piece.col);
      if (move) { executeMove(selectedPiece, move.row, move.col); return; }
      // clicking on non-target enemy piece falls through to deselect
    }
  }

  // Click on empty board
  if (selectedPiece && validMoves.length > 0) {
    const pos = getBoardPositionFromClick(event);
    if (pos && !board[pos.row][pos.col]) {
      const move = validMoves.find(m => m.row === pos.row && m.col === pos.col);
      if (move) { executeMove(selectedPiece, pos.row, pos.col); return; }
    }
  }

  // Deselect
  selectPiece(null);
  clearMarkers();
  validMoves = [];
}

function getBoardPositionFromClick(event) {
  pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const point = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(plane, point)) return null;

  const col = Math.round(point.x / CELL + 4);
  const row = Math.round(point.z / CELL + 4.5);

  if (!inBoard(col, row)) return null;

  const gridPos = boardToWorld(col, row);
  if (point.distanceTo(gridPos) > 0.4) return null;

  return { col, row };
}

function executeMove(piece, toRow, toCol) {
  const captured = board[toRow][toCol];
  const fromRow = piece.row, fromCol = piece.col;

  board[fromRow][fromCol] = null;
  board[toRow][toCol] = piece;
  piece.row = toRow;
  piece.col = toCol;
  if (captured) captured.alive = false;

  moveHistory.push({ piece, fromRow, fromCol, toRow, toCol, captured });

  selectPiece(null);
  clearMarkers();
  validMoves = [];
  updatePieces();

  currentTurn = enemyColor(currentTurn);
  if (isCheckmate(currentTurn)) gameOver = true;
  updateUI();
}

// ===== Scene Setup =====
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 18, 25);

  camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
  camera.position.set(6, 10, 8);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.domElement.style.display = 'block';
  document.body.prepend(renderer.domElement);

  // CSS2D Label Renderer (on top of everything)
  labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.body.appendChild(labelRenderer.domElement);

  // Controls
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);
  controls.minDistance = 5;
  controls.maxDistance = 20;
  controls.maxPolarAngle = Math.PI / 2.1;
  controls.update();

  // Lighting
  scene.add(new THREE.AmbientLight(0x404060, 0.5));
  scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a2a1a, 0.8));

  const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
  dirLight.position.set(8, 15, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.camera.left = -10;
  dirLight.shadow.camera.right = 10;
  dirLight.shadow.camera.top = 10;
  dirLight.shadow.camera.bottom = -10;
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0x8888ff, 0.6);
  fillLight.position.set(-5, 5, -8);
  scene.add(fillLight);

  // Ground (receives shadows)
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.15;
  ground.receiveShadow = true;
  scene.add(ground);

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();

  renderer.domElement.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('resize', onResize);

  createBoard();
  initBoardState();
  updatePieces();
  updateUI();
}

function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
}

// ===== Controls =====
document.getElementById('btnReset').addEventListener('click', () => {
  selectPiece(null);
  clearMarkers();
  validMoves = [];
  moveHistory = [];
  currentTurn = RED;
  gameOver = false;
  initBoardState();
  updatePieces();
  updateUI();
});

document.getElementById('btnRotate').addEventListener('click', () => {
  viewIndex = (viewIndex + 1) % VIEW_PRESETS.length;
  const p = VIEW_PRESETS[viewIndex];
  camera.position.set(p.pos[0], p.pos[1], p.pos[2]);
  controls.target.set(p.target[0], p.target[1], p.target[2]);
  controls.update();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') document.getElementById('btnReset').click();
  if (e.key === 'v' || e.key === 'V') document.getElementById('btnRotate').click();
});

// ===== Animation Loop =====
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ===== Start =====
initScene();
animate();

console.log('3D 中国象棋已加载！ 左键点击走棋，拖动旋转视角，滚轮缩放 | R=重开 V=换视角');
</script>
</body>
