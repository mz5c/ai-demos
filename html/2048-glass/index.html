<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="data:application/json,{}">
<title>2048 Glass</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-start:#667eea;--bg-end:#764ba2;
  --board-bg:rgba(255,255,255,0.08);--cell-bg:rgba(255,255,255,0.06);
  --text:#fff;--text-dim:rgba(255,255,255,0.6);
  --radius:14px;--cell-gap:10px;--container-px:15px;--container-py:20px;
}
body{
  background:linear-gradient(135deg,var(--bg-start),var(--bg-end));
  color:var(--text);font-family:'Poppins',system-ui,-apple-system,sans-serif;
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  padding:var(--container-py) var(--container-px);
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .8s ease;
}

.app{width:100%;max-width:500px}

/* Header */
.header{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.title{font-size:clamp(2.2rem,7vw,2.8rem);font-weight:900;line-height:1;letter-spacing:-2px;margin-right:auto;text-shadow:0 2px 10px rgba(0,0,0,.15)}
.scores{display:flex;gap:8px}
.score-box{
  background:rgba(255,255,255,.12);backdrop-filter:blur(8px);
  border-radius:10px;padding:6px 16px;text-align:center;min-width:80px;
  border:1px solid rgba(255,255,255,.1);
}
.score-box .label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);font-weight:600}
.score-box .value{font-size:20px;font-weight:800;color:#fff;line-height:1.2}
.btn{
  background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);
  border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;letter-spacing:.3px;backdrop-filter:blur(4px);
}
.btn:hover{background:rgba(255,255,255,.25);transform:translateY(-1px)}
.btn:active{transform:scale(.96)}
.btn-icon{width:40px;height:40px;padding:0;display:flex;align-items:center;justify-content:center;font-size:18px}

/* Board */
.board-wrap{position:relative}
.board{
  position:relative;background:var(--board-bg);backdrop-filter:blur(12px);
  border-radius:var(--radius);padding:var(--cell-gap);aspect-ratio:1;width:100%;
  touch-action:none;border:1px solid rgba(255,255,255,.1);
}
.grid-cells{display:grid;gap:var(--cell-gap);grid-template-columns:repeat(4,1fr);height:100%}
.grid-cell{
  background:var(--cell-bg);border-radius:calc(var(--radius) - 2px);
  border:1px solid rgba(255,255,255,.04);
}
.tile-container{position:absolute;top:var(--cell-gap);left:var(--cell-gap);right:var(--cell-gap);bottom:var(--cell-gap);pointer-events:none}
#particleCanvas{position:absolute;top:var(--cell-gap);left:var(--cell-gap);width:calc(100% - var(--cell-gap)*2);height:calc(100% - var(--cell-gap)*2);pointer-events:none;z-index:10}

.tile{
  position:absolute;display:flex;align-items:center;justify-content:center;
  font-weight:800;border-radius:var(--radius);
  transition:transform .12s cubic-bezier(0.34,1.56,0.64,1);
  will-change:transform;z-index:1;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  color:#fff;
}
.tile-new{animation:tile-appear .2s cubic-bezier(0.34,1.56,0.64,1)}
.tile-merged{z-index:2;animation:tile-pop .25s ease;box-shadow:0 0 30px rgba(255,255,255,.3)}

@keyframes tile-appear{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes tile-pop{
  0%{transform:scale(1)}
  30%{transform:scale(1.25)}
  60%{transform:scale(.95)}
  100%{transform:scale(1)}
}

.score-pop{animation:score-pop .3s ease}
@keyframes score-pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

.milestone-toast{
  position:fixed;top:20%;left:50%;transform:translate(-50%,-50%);
  font-size:2rem;font-weight:900;color:#ffd700;pointer-events:none;z-index:200;
  text-shadow:0 0 30px rgba(255,215,0,.5);
  animation:toast-float 1.2s ease forwards;
}
@keyframes toast-float{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  40%{transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-150%) scale(1)}
}

/* Overlay */
.overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.55);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;opacity:0;pointer-events:none;transition:opacity .4s ease;
  backdrop-filter:blur(4px);
}
.overlay.active{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(2rem,7vw,3rem);font-weight:900;margin-bottom:8px;color:#fff}
.overlay p{font-size:1rem;margin-bottom:20px;opacity:.8;color:rgba(255,255,255,.8)}
.overlay .btn{font-size:1rem;padding:12px 28px}

/* Footer */
.footer{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.combo-badge{
  background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.15);border-radius:20px;
  padding:4px 14px;font-size:12px;font-weight:700;color:var(--text-dim);
  transition:all .25s ease;opacity:0;transform:scale(.8);
}
.combo-badge.active{opacity:1;transform:scale(1)}
.combo-badge.hot{color:#ffd700;border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.15);animation:combo-pulse .6s ease infinite}
@keyframes combo-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.hint{text-align:center;margin-top:4px;font-size:12px;opacity:.4}
.undo-btn{font-size:12px;padding:6px 14px;opacity:.6}
.undo-btn:disabled{opacity:.2;pointer-events:none}

@media (max-width:420px){
  :root{--cell-gap:6px;--container-px:10px;--container-py:10px;--radius:10px}
  .score-box{min-width:66px;padding:4px 10px}
  .score-box .value{font-size:16px}
  .btn{padding:8px 14px;font-size:12px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1 class="title">2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">寰楀垎</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">鏈€楂?/div>
        <div class="value" id="best">0</div>
      </div>
    </div>
    <button class="btn btn-icon" id="muteBtn" title="闊虫晥" aria-label="鍒囨崲闊虫晥">馃攰</button>
    <button class="btn" id="newGameBtn">鏂版父鎴?/button>
  </header>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="grid-cells" id="gridCells"></div>
      <div class="tile-container" id="tileContainer"></div>
      <canvas id="particleCanvas" aria-label="绮掑瓙鐗规晥"></canvas>
      <div class="overlay" id="overlay" role="dialog" aria-modal="true">
        <h2 id="overlayTitle"></h2>
        <p id="overlayMsg"></p>
        <button class="btn" id="overlayBtn">鍐嶆潵涓€灞€</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn undo-btn" id="undoBtn" disabled>鈫?鎾ら攢</button>
    <div class="combo-badge" id="comboBadge"></div>
  </div>
  <p class="hint">鈫?鈫?鈫?鈫?鎴?WASD 路 婊戝姩鎿嶄綔</p>
</div>

<script>
// ===== JS 鐢卞悗缁?Task 閫愭濉厖 =====

/**
 * Board 鈥?Pure data layer. 4脳4 grid, slide/merge, win/lose detection.
 * No DOM access, no side effects.
 */
class Board {
  constructor(size = 4) {
    this.size = size;
    this.grid = [];
    this._idCounter = 0;
  }

  init() {
    this.grid = Array.from({ length: this.size }, () => Array(this.size).fill(null));
    this._idCounter = 0;
    this.addRandomTile();
    this.addRandomTile();
  }

  _nextId() { return this._idCounter++; }

  get(r, c) { return this.grid[r]?.[c] ?? null; }
  set(r, c, tile) { this.grid[r][c] = tile; }

  _eachCell(fn) {
    for (let r = 0; r < this.size; r++)
      for (let c = 0; c < this.size; c++)
        fn(r, c, this.grid[r][c]);
  }

  _randomEmptyCell() {
    const empty = [];
    this._eachCell((r, c, t) => { if (!t) empty.push([r, c]); });
    return empty.length ? empty[Math.floor(Math.random() * empty.length)] : null;
  }

  addRandomTile() {
    const pos = this._randomEmptyCell();
    if (!pos) return null;
    const tile = { id: this._nextId(), value: Math.random() < 0.9 ? 2 : 4, isNew: true };
    this.set(pos[0], pos[1], tile);
    return tile;
  }

  /**
   * Slide one row left, merge adjacent equal tiles.
   * Returns the new row and score gained.
   * Merged tiles reuse the second tile's id so DOM element follows.
   */
  _slideRow(row) {
    let tiles = row.filter(t => t !== null);
    let score = 0;

    for (let i = 0; i < tiles.length - 1; i++) {
      if (!tiles[i].isMerged && tiles[i].value === tiles[i + 1].value) {
        const val = tiles[i].value * 2;
        tiles[i] = null;
        tiles[i + 1] = { id: tiles[i + 1].id, value: val, isMerged: true };
        score += val;
      }
    }
    tiles = tiles.filter(t => t !== null);
    while (tiles.length < this.size) tiles.push(null);
    return { row: tiles, score };
  }

  _moveLeft() {
    let totalScore = 0, moved = false;
    for (let r = 0; r < this.size; r++) {
      const { row, score } = this._slideRow(this.grid[r]);
      if (score) totalScore += score;
      for (let c = 0; c < this.size; c++) {
        if (this.grid[r][c] !== row[c]) moved = true;
        this.grid[r][c] = row[c];
      }
    }
    return { moved, score: totalScore };
  }

  /** Rotate grid 90掳 CCW 鈥?so "left" works for all 4 directions */
  _rotateCCW() {
    const n = this.size;
    const ng = Array.from({ length: n }, () => Array(n).fill(null));
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        ng[r][c] = this.grid[c][n - 1 - r];
    this.grid = ng;
  }

  _rotateCW() {
    const n = this.size;
    const ng = Array.from({ length: n }, () => Array(n).fill(null));
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        ng[r][c] = this.grid[n - 1 - c][r];
    this.grid = ng;
  }

  /**
   * Move in direction. Returns { moved, score, merged: [...] }.
   * merged array: [{ row, col, value }]
   */
  move(direction) {
    const dirMap = { up: 'ccw', down: 'cw', right: 'ccw2' };
    const rot = dirMap[direction];

    if (rot === 'ccw') this._rotateCCW();
    else if (rot === 'cw') this._rotateCW();
    else if (rot === 'ccw2') { this._rotateCCW(); this._rotateCCW(); }

    const result = this._moveLeft();

    // Collect merged tile info BEFORE rotating back
    const merged = [];
    this._eachCell((r, c, t) => {
      if (t && t.isMerged) merged.push({ row: r, col: c, value: t.value });
    });

    if (rot === 'ccw') this._rotateCW();
    else if (rot === 'cw') this._rotateCCW();
    else if (rot === 'ccw2') { this._rotateCW(); this._rotateCW(); }

    return { ...result, merged };
  }

  isGameOver() {
    for (let r = 0; r < this.size; r++) {
      for (let c = 0; c < this.size; c++) {
        if (!this.grid[r][c]) return false;
        if (c < this.size - 1 && this.grid[r][c+1] && this.grid[r][c].value === this.grid[r][c+1].value) return false;
        if (r < this.size - 1 && this.grid[r+1][c] && this.grid[r][c].value === this.grid[r+1][c].value) return false;
      }
    }
    return true;
  }

  hasWon() {
    let won = false;
    this._eachCell((r, c, t) => { if (t && t.value >= 2048) won = true; });
    return won;
  }

  /** Deep-clone grid state for undo */
  getSnapshot() {
    return {
      grid: this.grid.map(row => row.map(t => t ? { id: t.id, value: t.value } : null)),
      idCounter: this._idCounter,
    };
  }

  restoreSnapshot(snap) {
    this.grid = snap.grid.map(row => row.map(t => t ? { ...t } : null));
    this._idCounter = snap.idCounter;
  }
}

/**
 * Renderer 鈥?DOM-based tile rendering with CSS transition/animation.
 * Reads Board data, creates/updates tile elements.
 */
class Renderer {
  constructor(boardEl, tileContainer, gridCells) {
    this.boardEl = boardEl;
    this.tileContainer = tileContainer;
    this.gridCells = gridCells;
    this.tileEls = new Map(); // tile.id 鈫?HTMLElement
    this.cellSize = 0;
    this.gap = 0;
    this.size = 4;

    // Create static background cells
    for (let i = 0; i < this.size * this.size; i++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      gridCells.appendChild(cell);
    }

    this.updateLayout();
    window.addEventListener('resize', () => this.updateLayout());
  }

  updateLayout() {
    const rect = this.boardEl.getBoundingClientRect();
    const style = getComputedStyle(this.boardEl);
    this.gap = parseFloat(style.getPropertyValue('--cell-gap'));
    const inner = rect.width - this.gap * 2;
    this.cellSize = (inner - this.gap * (this.size - 1)) / this.size;
  }

  _tilePos(row, col) {
    const step = this.cellSize + this.gap;
    return `translate(${col * step}px, ${row * step}px)`;
  }

  _tileSize() { return `${this.cellSize}px`; }

  _tileClass(value) {
    if (value <= 2048) return 'tile-' + value;
    return 'tile-super';
  }

  /** Full render from Board state */
  render(board) {
    // Remove stale tile elements
    const activeIds = new Set();
    board._eachCell((r, c, t) => { if (t) activeIds.add(t.id); });
    this.tileEls.forEach((el, id) => {
      if (!activeIds.has(id)) { el.remove(); this.tileEls.delete(id); }
    });

    // Create or update tile elements
    board._eachCell((r, c, tile) => {
      if (!tile) return;
      let el = this.tileEls.get(tile.id);
      if (!el) {
        el = document.createElement('div');
        el.className = 'tile';
        this.tileContainer.appendChild(el);
        this.tileEls.set(tile.id, el);
      }

      el.style.transform = this._tilePos(r, c);
      el.style.width = this._tileSize();
      el.style.height = this._tileSize();
      el.textContent = tile.value;
      el.className = 'tile ' + this._tileClass(tile.value);

      if (tile.isNew) {
        el.classList.add('tile-new');
        tile.isNew = false;
        setTimeout(() => el.classList.remove('tile-new'), 220);
      }
      if (tile.isMerged) {
        el.classList.add('tile-merged');
        tile.isMerged = false;
        setTimeout(() => el.classList.remove('tile-merged'), 270);
      }
    });
  }

  /** Return pixel position of a grid cell center (for particle emission) */
  cellCenter(row, col) {
    const step = this.cellSize + this.gap;
    return {
      x: col * step + this.cellSize / 2,
      y: row * step + this.cellSize / 2,
    };
  }

  updateScore(scoreEl, bestEl, score, best) {
    scoreEl.textContent = score;
    scoreEl.classList.remove('score-pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('score-pop');
    bestEl.textContent = best;
  }

  showCombo(badgeEl, count) {
    if (!badgeEl) return;
    if (count > 0) {
      badgeEl.textContent = `\u{1F525} x${count} COMBO`;
      badgeEl.classList.add('active');
      badgeEl.classList.toggle('hot', count >= 3);
    } else {
      badgeEl.classList.remove('active', 'hot');
    }
  }

  showOverlay(overlay, title, msg, btnText, onClick) {
    const titleEl = overlay.querySelector('h2');
    const msgEl = overlay.querySelector('p');
    const btn = overlay.querySelector('button');
    titleEl.textContent = title;
    msgEl.textContent = msg;
    btn.textContent = btnText;
    btn.onclick = onClick;
    overlay.classList.add('active');
  }

  hideOverlay(overlay) {
    overlay.classList.remove('active');
  }

  showMilestone(value) {
    const toast = document.createElement('div');
    toast.className = 'milestone-toast';
    toast.textContent = `\u{1F389} ${value}!`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1300);
  }
}

/**
 * InputManager 鈥?Unified input handling (keyboard + touch + mouse).
 * Calls onMove(direction) callback with 'left'|'right'|'up'|'down'.
 */
class InputManager {
  constructor(element, onMove) {
    this.el = element;
    this.onMove = onMove;
    this._bindKeyboard();
    this._bindTouch();
    this._bindMouse();
  }

  _emit(dir) { if (this.onMove) this.onMove(dir); }

  _bindKeyboard() {
    this._onKey = (e) => {
      const map = {
        ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
        a:'left',d:'right',w:'up',s:'down',
      };
      const dir = map[e.key];
      if (dir) { e.preventDefault(); this._emit(dir); }
    };
    document.addEventListener('keydown', this._onKey);
  }

  _bindTouch() {
    let sx, sy;
    this._onTouchStart = (e) => {
      const t = e.touches[0]; sx = t.clientX; sy = t.clientY;
    };
    this._onTouchEnd = (e) => {
      if (sx == null) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - sx, dy = t.clientY - sy;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) { sx = sy = null; return; }
      this._emit(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
      sx = sy = null;
    };
    this._onTouchCancel = () => { sx = sy = null; };
    this.el.addEventListener('touchstart', this._onTouchStart, { passive: true });
    this.el.addEventListener('touchend', this._onTouchEnd, { passive: true });
    this.el.addEventListener('touchcancel', this._onTouchCancel, { passive: true });
  }

  _bindMouse() {
    let down = false, mx, my;
    this._onMouseDown = (e) => { down = true; mx = e.clientX; my = e.clientY; e.preventDefault(); };
    this._onMouseUp = (e) => {
      if (!down) return; down = false;
      const dx = e.clientX - mx, dy = e.clientY - my;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
      this._emit(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
    };
    this._onMouseLeave = () => { down = false; };
    this.el.addEventListener('mousedown', this._onMouseDown);
    this.el.addEventListener('mouseup', this._onMouseUp);
    this.el.addEventListener('mouseleave', this._onMouseLeave);
  }

  destroy() {
    document.removeEventListener('keydown', this._onKey);
    this.el.removeEventListener('touchstart', this._onTouchStart);
    this.el.removeEventListener('touchend', this._onTouchEnd);
    this.el.removeEventListener('touchcancel', this._onTouchCancel);
    this.el.removeEventListener('mousedown', this._onMouseDown);
    this.el.removeEventListener('mouseup', this._onMouseUp);
    this.el.removeEventListener('mouseleave', this._onMouseLeave);
  }
}

/**
 * ParticleFX 鈥?Canvas-based particle system with object pool.
 * Emits particles on merge events, renders with requestAnimationFrame.
 */
class ParticleFX {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.pool = [];
    this.active = [];
    this.POOL_SIZE = 300;
    this.running = false;

    // Pre-allocate particle objects
    for (let i = 0; i < this.POOL_SIZE; i++) {
      this.pool.push({ x: 0, y: 0, vx: 0, vy: 0, radius: 3, color: '#fff', life: 0, maxLife: 0, gravity: 60 });
    }
  }

  /** Resize canvas to match container */
  resize(w, h) {
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = w * dpr;
    this.canvas.height = h * dpr;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.w = w; this.h = h;
  }

  _acquire() { return this.pool.pop() || null; }
  _release(p) { if (this.pool.length < this.POOL_SIZE) this.pool.push(p); }

  /**
   * Emit particles at position.
   * @param {number} x - center x in canvas coords
   * @param {number} y - center y
   * @param {string} color - hex color
   * @param {number} count - number of particles
   * @param {number} value - tile value (affects spread)
   */
  emit(x, y, color, count, value = 2) {
    const spread = Math.min(value / 16, 3);
    for (let i = 0; i < count; i++) {
      const p = this._acquire();
      if (!p) break;
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 170 * spread;
      p.x = x; p.y = y;
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      p.radius = 3 + Math.random() * 5;
      p.color = color;
      p.maxLife = 0.4 + Math.random() * 0.4;
      p.life = p.maxLife;
      p.gravity = 60;
      this.active.push(p);
    }
    if (!this.running) this._startLoop();
  }

  /** Ring burst for milestones */
  emitBurst(cx, cy, count = 70) {
    const colors = ['#ffd700', '#ffaa00', '#ff6600', '#fff8dc'];
    for (let i = 0; i < count; i++) {
      const p = this._acquire();
      if (!p) break;
      const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
      const speed = 150 + Math.random() * 200;
      p.x = cx; p.y = cy;
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      p.radius = 3 + Math.random() * 6;
      p.color = colors[Math.floor(Math.random() * colors.length)];
      p.maxLife = 0.6 + Math.random() * 0.6;
      p.life = p.maxLife;
      p.gravity = 40;
      this.active.push(p);
    }
    if (!this.running) this._startLoop();
  }

  _startLoop() {
    this.running = true;
    this._lastTime = performance.now();
    this._tick = (now) => {
      const dt = Math.min((now - this._lastTime) / 1000, 0.05);
      this._lastTime = now;
      this.ctx.clearRect(0, 0, this.w, this.h);
      let hasActive = false;
      for (let i = this.active.length - 1; i >= 0; i--) {
        const p = this.active[i];
        p.life -= dt;
        if (p.life <= 0) {
          this._release(p);
          this.active.splice(i, 1);
          continue;
        }
        hasActive = true;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += p.gravity * dt;
        const alpha = p.life / p.maxLife;
        this.ctx.globalAlpha = alpha;
        this.ctx.fillStyle = p.color;
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
        this.ctx.fill();
      }
      this.ctx.globalAlpha = 1;
      if (hasActive) {
        requestAnimationFrame(this._tick);
      } else {
        this.running = false;
        this.ctx.clearRect(0, 0, this.w, this.h);
      }
    };
    requestAnimationFrame(this._tick);
  }
}

/**
 * AudioEngine 鈥?Web Audio API sound synthesis (zero file dependencies).
 * Lazy-init AudioContext on first user interaction (browser autoplay policy).
 */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = localStorage.getItem('mute2048glass') === 'true';
  }

  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  toggleMute() {
    this.muted = !this.muted;
    localStorage.setItem('mute2048glass', this.muted);
    return this.muted;
  }

  /** Generate short noise buffer for slide effect */
  _noiseBuffer(duration) {
    const sr = this.ctx.sampleRate;
    const len = sr * duration;
    const buf = this.ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  play(name, opts = {}) {
    if (this.muted) return;
    this._init();
    const ctx = this.ctx;
    const now = ctx.currentTime;

    switch (name) {
      case 'slide': {
        const src = ctx.createBufferSource();
        src.buffer = this._noiseBuffer(0.05);
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.value = 800;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start(now); src.stop(now + 0.05);
        break;
      }
      case 'merge-small': {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(880, now + 0.08);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now); osc.stop(now + 0.1);
        break;
      }
      case 'merge-medium': {
        // Main tone
        const osc1 = ctx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(330, now);
        osc1.frequency.linearRampToValueAtTime(990, now + 0.12);
        const g1 = ctx.createGain();
        g1.gain.setValueAtTime(0.12, now);
        g1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc1.connect(g1).connect(ctx.destination);
        osc1.start(now); osc1.stop(now + 0.15);
        // Harmonic overtone
        const osc2 = ctx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(660, now);
        osc2.frequency.linearRampToValueAtTime(1980, now + 0.12);
        const g2 = ctx.createGain();
        g2.gain.setValueAtTime(0.05, now);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc2.connect(g2).connect(ctx.destination);
        osc2.start(now); osc2.stop(now + 0.15);
        break;
      }
      case 'merge-large': {
        const osc1 = ctx.createOscillator();
        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(220, now);
        osc1.frequency.linearRampToValueAtTime(1320, now + 0.2);
        const g1 = ctx.createGain();
        g1.gain.setValueAtTime(0.18, now);
        g1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc1.connect(g1).connect(ctx.destination);
        osc1.start(now); osc1.stop(now + 0.25);
        // Fifth overtone
        const osc2 = ctx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(330, now);
        osc2.frequency.linearRampToValueAtTime(1980, now + 0.2);
        const g2 = ctx.createGain();
        g2.gain.setValueAtTime(0.08, now);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc2.connect(g2).connect(ctx.destination);
        osc2.start(now); osc2.stop(now + 0.25);
        break;
      }
      case 'combo': {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.linearRampToValueAtTime(1760, now + 0.06);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now); osc.stop(now + 0.08);
        break;
      }
      case 'milestone': {
        const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = freq;
          const gain = ctx.createGain();
          const t = now + i * 0.08;
          gain.gain.setValueAtTime(0.12, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t); osc.stop(t + 0.15);
        });
        break;
      }
      case 'gameover': {
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.linearRampToValueAtTime(110, now + 0.4);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now); osc.stop(now + 0.5);
        break;
      }
    }
  }
}


/**
 * Game2048 — Main controller. Coordinates Board, Renderer, ParticleFX,
 * AudioEngine, and InputManager. Manages score, combo, undo, milestones.
 */
class Game2048 {
  constructor() {
    this.size = 4;
    this.score = 0;
    this.best = parseInt(localStorage.getItem('best2048glass')) || 0;
    this.comboCount = 0;
    this.over = false;
    this.won = false;
    this.keepPlaying = false;
    this.history = [];        // undo stack (max 5)
    this.reachedMilestones = new Set();

    // DOM refs
    this.boardEl = document.getElementById('board');
    this.scoreEl = document.getElementById('score');
    this.bestEl = document.getElementById('best');
    this.overlay = document.getElementById('overlay');
    this.comboBadge = document.getElementById('comboBadge');
    this.undoBtn = document.getElementById('undoBtn');
    this.muteBtn = document.getElementById('muteBtn');
    this.particleCanvas = document.getElementById('particleCanvas');

    // Subsystems
    this.board = new Board(this.size);
    this.renderer = new Renderer(
      this.boardEl,
      document.getElementById('tileContainer'),
      document.getElementById('gridCells')
    );
    this.audio = new AudioEngine();
    this.particles = new ParticleFX(this.particleCanvas);
    this.input = new InputManager(this.boardEl, (dir) => this._onMove(dir));

    // Init canvas size
    const tileContainer = document.getElementById('tileContainer');
    const tcRect = tileContainer.getBoundingClientRect();
    this.particles.resize(tcRect.width, tcRect.height);

    // UI bindings
    document.getElementById('newGameBtn').addEventListener('click', () => this.newGame());
    this.undoBtn.addEventListener('click', () => this.undo());
    this.muteBtn.addEventListener('click', () => this._toggleMute());
    window.addEventListener('resize', () => {
      this.renderer.updateLayout();
      const tcr = tileContainer.getBoundingClientRect();
      this.particles.resize(tcr.width, tcr.height);
    });

    // Init display
    this.bestEl.textContent = this.best;
    this._updateMuteIcon();
    this.board.init();
    this.renderer.render(this.board);
  }

  /** Start a new game */
  newGame() {
    this.board.init();
    this.score = 0;
    this.comboCount = 0;
    this.over = false;
    this.won = false;
    this.keepPlaying = false;
    this.history = [];
    this.reachedMilestones.clear();
    this.renderer.hideOverlay(this.overlay);
    this.renderer.updateScore(this.scoreEl, this.bestEl, this.score, this.best);
    this.renderer.showCombo(this.comboBadge, 0);
    this._updateUndoBtn();
    document.body.style.background = 'linear-gradient(135deg, var(--bg-start), var(--bg-end))';
    this.renderer.render(this.board);
  }

  /** Handle a move in given direction */
  _onMove(direction) {
    if (this.over) return;

    // Save state for undo BEFORE moving
    this.history.push({
      grid: this.board.getSnapshot(),
      score: this.score,
      comboCount: this.comboCount,
    });
    if (this.history.length > 5) this.history.shift();

    const result = this.board.move(direction);
    if (!result.moved) {
      this.history.pop(); // no move, discard undo state
      return;
    }

    // Sound: slide
    this.audio.play('slide');

    // Update combo
    if (result.merged.length > 0) {
      this.comboCount++;
      const totalMerged = result.merged.reduce((s, m) => s + m.value, 0);
      this.score += Math.floor(totalMerged * (1 + this.comboCount * 0.1));

      if (this.comboCount >= 3) {
        this.audio.play('combo');
      }
    } else {
      this.comboCount = 0;
    }

    // Update best score
    if (this.score > this.best) {
      this.best = this.score;
      localStorage.setItem('best2048glass', this.best);
    }

    // Spawn new tile
    this.board.addRandomTile();

    // Render
    this.renderer.render(this.board);
    this.renderer.updateScore(this.scoreEl, this.bestEl, this.score, this.best);
    this.renderer.showCombo(this.comboBadge, this.comboCount);

    // Particles & sound for each merge
    result.merged.forEach(m => {
      const pos = this.renderer.cellCenter(m.row, m.col);
      const hex = this._tileHex(m.value);
      const count = this._particleCount(m.value);
      this.particles.emit(pos.x, pos.y, hex, count, m.value);

      if (m.value < 64) this.audio.play('merge-small');
      else if (m.value < 512) this.audio.play('merge-medium');
      else this.audio.play('merge-large');

      // Vibration
      if (navigator.vibrate) {
        const dur = m.value < 64 ? 15 : m.value < 512 ? 30 : 50;
        navigator.vibrate(dur);
      }

      // Milestone check
      this._checkMilestone(m.value);
    });

    this._updateUndoBtn();

    // Win / Game over check
    if (!this.won && this.board.hasWon()) {
      this.won = true;
      if (!this.keepPlaying) {
        setTimeout(() => {
          this.renderer.showOverlay(
            this.overlay, '恭喜你！', '你达到了 2048！',
            '继续挑战', () => { this.keepPlaying = true; this.renderer.hideOverlay(this.overlay); }
          );
          this._celebrateMilestone(2048);
        }, 300);
      }
    }

    if (this.board.isGameOver()) {
      this.over = true;
      this.audio.play('gameover');
      setTimeout(() => {
        this.renderer.showOverlay(
          this.overlay, '游戏结束', '没有可用的移动了',
          '再来一局', () => this.newGame()
        );
      }, 400);
    }
  }

  /** Undo last move */
  undo() {
    if (this.history.length === 0) return;
    const state = this.history.pop();
    this.board.restoreSnapshot(state.grid);
    this.score = state.score;
    this.comboCount = 0; // reset combo on undo
    this.renderer.render(this.board);
    this.renderer.updateScore(this.scoreEl, this.bestEl, this.score, this.best);
    this.renderer.showCombo(this.comboBadge, 0);
    this._updateUndoBtn();
  }

  _updateUndoBtn() {
    this.undoBtn.disabled = this.history.length === 0;
  }

  _toggleMute() {
    const muted = this.audio.toggleMute();
    this._updateMuteIcon(muted);
  }

  _updateMuteIcon(muted) {
    muted = muted ?? this.audio.muted;
    this.muteBtn.textContent = muted ? '🔇' : '🔊';
  }

  /** Number of particles based on merge value */
  _particleCount(value) {
    if (value < 64) return 8 + Math.floor(Math.random() * 5);
    if (value < 256) return 15 + Math.floor(Math.random() * 11);
    return 25 + Math.floor(Math.random() * 16);
  }

  /** Approximate hex color for a tile value (for particle tinting) */
  _tileHex(value) {
    if (value <= 4) return '#ffffff';
    if (value <= 16) return '#ffa064';
    if (value <= 64) return '#ff5a28';
    if (value <= 256) return '#f0c850';
    if (value <= 1024) return '#f0b428';
    return '#ffd700';
  }

  /** Check and trigger milestone celebration */
  _checkMilestone(value) {
    const milestones = [256, 512, 1024, 2048, 4096];
    if (milestones.includes(value) && !this.reachedMilestones.has(value)) {
      this.reachedMilestones.add(value);
      this._celebrateMilestone(value);
    }
  }

  _celebrateMilestone(value) {
    // Toast message
    this.renderer.showMilestone(value);
    // Sound
    this.audio.play('milestone');
    // Center burst
    const tcRect = document.getElementById('tileContainer').getBoundingClientRect();
    this.particles.emitBurst(tcRect.width / 2, tcRect.height / 2, 70);
    // Dynamic background shift toward gold
    this._updateBackgroundGradient(value);
  }

  /** Shift background gradient toward gold as higher tiles appear */
  _updateBackgroundGradient(value) {
    const maxTile = Math.max(
      ...this.board.grid.flat().map(t => t ? t.value : 0)
    );
    const ratio = Math.min(1, Math.max(0, (maxTile - 256) / 1792));
    const r1 = Math.round(102 + ratio * (237 - 102));
    const g1 = Math.round(126 + ratio * (194 - 126));
    const b1 = Math.round(234 + ratio * (46 - 234));
    const r2 = Math.round(118 + ratio * (237 - 118));
    const g2 = Math.round(75 + ratio * (194 - 75));
    const b2 = Math.round(162 + ratio * (46 - 162));
    document.body.style.background =
      `linear-gradient(135deg, rgb(${r1},${g1},${b1}), rgb(${r2},${g2},${b2}))`;
  }
}

// ========== Instantiate ==========
const game = new Game2048();
</script>
