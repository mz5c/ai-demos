<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五彩斑斓的黑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }
  .title {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.15);
    letter-spacing: 6px;
    user-select: none;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(255,255,255,0.05);
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title">五彩斑斓的黑</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── 粒子群 ────────────────────────────────────
const COUNT = 280;
const particles = Array.from({ length: COUNT }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.6,
  vy: (Math.random() - 0.5) * 0.6,
  size: Math.random() * 3 + 1.5,
  hue: Math.random() * 360,
  hueSpeed: (Math.random() - 0.5) * 0.8,
  life: Math.random() * Math.PI * 2,
}));

// ─── 鼠标 ──────────────────────────────────────
let mx = W / 2, my = H / 2;
let trail = [];
canvas.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  trail.push({ x: mx, y: my, life: 1 });
  if (trail.length > 60) trail.shift();
});
canvas.addEventListener('mouseleave', () => { mx = -999; my = -999; });

function drawTrail() {
  for (let i = trail.length - 1; i >= 0; i--) {
    const p = trail[i];
    p.life -= 0.018;
    if (p.life <= 0) { trail.splice(i, 1); continue; }
    const alpha = p.life * 0.5;
    const r = p.life * 18;
    const hue = (performance.now() * 0.05 + i * 6) % 360;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grad.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha})`);
    grad.addColorStop(0.5, `hsla(${hue}, 100%, 50%, ${alpha * 0.4})`);
    grad.addColorStop(1, `hsla(${hue}, 100%, 30%, 0)`);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

// ─── 流光波浪 ─────────────────────────────────
function drawWaves(t) {
  ctx.lineWidth = 1.8;
  for (let w = 0; w < 5; w++) {
    ctx.beginPath();
    const hue = (t * 0.02 + w * 72) % 360;
    const amp = 8 + w * 2;
    const freq = 0.008 + w * 0.001;
    ctx.moveTo(0, H / 2);
    for (let x = 0; x <= W; x += 2) {
      const y = H / 2
        + Math.sin(x * freq + t * 0.01 + w * 1.2) * amp
        + Math.sin(x * freq * 2.3 + t * 0.015 + w) * amp * 0.5;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `hsla(${hue}, 90%, 55%, 0.12)`;
    ctx.stroke();
  }
}

// ─── 闪烁星芒 ──────────────────────────────────
const stars = Array.from({ length: 120 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  phase: Math.random() * Math.PI * 2,
  speed: 0.5 + Math.random() * 2,
  hue: Math.random() * 360,
  size: 1 + Math.random() * 2.5,
}));

function drawStars(t) {
  for (const s of stars) {
    const brightness = (Math.sin(t * 0.003 * s.speed + s.phase) + 1) / 2;
    const alpha = brightness * 0.7;
    const r = s.size * (0.5 + brightness * 0.8);
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${alpha})`;
    ctx.fill();

    // 光晕
    if (brightness > 0.6) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 3, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue}, 100%, 60%, ${alpha * 0.1})`;
      ctx.fill();
    }
  }
}

// ─── 圆环呼吸 ──────────────────────────────────
function drawRings(t) {
  const cx = W / 2, cy = H / 2;
  for (let i = 0; i < 6; i++) {
    const radius = 80 + i * 35 + Math.sin(t * 0.005 + i * 0.9) * 20;
    const hue = (t * 0.03 + i * 50) % 360;
    const alpha = 0.04 + Math.sin(t * 0.004 + i) * 0.025;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${Math.max(0, alpha)})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ─── 主循环 ────────────────────────────────────
function loop(t) {
  // 极深黑色背景 + 极微弱残影制造拖尾效果
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  ctx.fillRect(0, 0, W, H);

  // 在不直接可见的极小范围内混合色彩，制造"黑中透彩"的效果
  const imgData = ctx.getImageData(0, 0, W, H);
  const data = imgData.data;
  for (let i = 0; i < data.length; i += 4) {
    // 将 RGB 值轻微上提，但不超过肉眼可见阈值 (<= 3)
    // 同时随机注入极微弱的色偏，让黑色本身就有色彩倾向
    if (data[i] > 0 && data[i] < 8) {
      data[i] = Math.min(7, data[i] + 1 + (Math.random() > 0.995 ? 3 : 0));
      data[i+1] = Math.min(7, data[i+1] + 1 + (Math.random() > 0.995 ? 3 : 0));
      data[i+2] = Math.min(7, data[i+2] + 1 + (Math.random() > 0.995 ? 3 : 0));
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // 绘制各层
  drawWaves(t);
  drawRings(t);
  drawStars(t);
  drawTrail();

  // 粒子
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.hue += p.hueSpeed;
    p.life += 0.01;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;

    const alpha = 0.2 + Math.sin(p.life) * 0.1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
    ctx.fill();
  }

  // 鼠标引力
  if (mx > 0 && my > 0) {
    for (const p of particles) {
      const dx = mx - p.x, dy = my - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        p.vx += dx / dist * 0.02;
        p.vy += dy / dist * 0.02;
        const maxSpeed = 2.5;
        const sp = Math.sqrt(p.vx ** 2 + p.vy ** 2);
        if (sp > maxSpeed) { p.vx *= maxSpeed / sp; p.vy *= maxSpeed / sp; }
      }
    }
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
